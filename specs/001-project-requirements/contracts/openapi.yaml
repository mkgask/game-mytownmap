openapi: 3.1.0
info:
  title: MyTownMap Client Boundary API
  version: 0.1.0
  description: |
    Logical API surface for in-browser services handling road/building CRUD, seeded simulation, and persistence.
    Endpoints may be implemented as local service adapters rather than remote HTTP calls; contracts keep concerns separated.
servers:
  - url: https://localhost/mock
paths:
  /roads:
    post:
      summary: Draw or modify roads (batch upsert)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoadBatchRequest'
      responses:
        '200':
          description: Roads created/updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoadBatchResponse'
  /roads/{roadId}:
    delete:
      summary: Remove a road segment by id
      parameters:
        - name: roadId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Road removed when not in use by active vehicles
        '409':
          description: Road cannot be removed due to active vehicle occupancy
  /buildings:
    post:
      summary: Place a building adjacent to roads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildingCreateRequest'
      responses:
        '201':
          description: Building placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildingResource'
  /buildings/{buildingId}:
    patch:
      summary: Update building metadata or capacity
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildingUpdateRequest'
      responses:
        '200':
          description: Building updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildingResource'
    delete:
      summary: Remove a building
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Building removed after unassigning residents/workers
        '409':
          description: Building removal blocked due to active assignments
  /assignments/residents:
    post:
      summary: Assign residents to residences and workplaces respecting capacity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResidentAssignmentRequest'
      responses:
        '200':
          description: Assignments applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResult'
        '409':
          description: Capacity exceeded for at least one building
  /simulation/seed:
    post:
      summary: Set the deterministic simulation seed and derive subsystem streams
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeedRequest'
      responses:
        '200':
          description: Seed applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeedResponse'
  /simulation/run-day:
    post:
      summary: Execute a full day cycle deterministically
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunDayRequest'
      responses:
        '200':
          description: Day simulation completed with per-tick hashes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDayResponse'
  /simulation/save:
    post:
      summary: Persist current state to IndexedDB (logical API)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveRequest'
      responses:
        '200':
          description: Save completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveResponse'

components:
  schemas:
    RoadBatchRequest:
      type: object
      properties:
        seed:
          type: string
          description: Seed used to maintain deterministic ordering of road IDs
        roads:
          type: array
          items:
            $ref: '#/components/schemas/RoadResource'
      required: [seed, roads]
    RoadBatchResponse:
      type: object
      properties:
        roads:
          type: array
          items:
            $ref: '#/components/schemas/RoadResource'
    RoadResource:
      type: object
      properties:
        id:
          type: string
        start_node_id:
          type: string
        end_node_id:
          type: string
        is_bidirectional:
          type: boolean
        capacity_vehicle_count:
          type: integer
          minimum: 1
        length_meters:
          type: number
        connected_edge_gateway_id:
          type: string
          nullable: true
      required: [id, start_node_id, end_node_id, is_bidirectional, capacity_vehicle_count, length_meters]
    BuildingCreateRequest:
      type: object
      properties:
        parcel_type:
          type: string
          enum: [residence, shop, factory]
        road_adjacent_segment_ids:
          type: array
          items:
            type: string
          minItems: 1
        worker_capacity:
          type: integer
          minimum: 0
        workplace_role:
          type: string
          enum: [workplace_shop, shopping_destination]
          nullable: true
        location_tile:
          type: string
      required: [parcel_type, road_adjacent_segment_ids, location_tile]
    BuildingUpdateRequest:
      type: object
      properties:
        worker_capacity:
          type: integer
          minimum: 0
        workplace_role:
          type: string
          enum: [workplace_shop, shopping_destination]
        goods_inventory:
          type: integer
          minimum: 0
      additionalProperties: false
    BuildingResource:
      allOf:
        - $ref: '#/components/schemas/BuildingCreateRequest'
        - type: object
          properties:
            id:
              type: string
            assigned_worker_ids:
              type: array
              items:
                type: string
            resident_ids:
              type: array
              items:
                type: string
    ResidentAssignmentRequest:
      type: object
      properties:
        assignments:
          type: array
          items:
            type: object
            properties:
              resident_id:
                type: string
              residence_building_id:
                type: string
              workplace_building_id:
                type: string
                nullable: true
            required: [resident_id, residence_building_id]
      required: [assignments]
    AssignmentResult:
      type: object
      properties:
        applied_count:
          type: integer
        rejected:
          type: array
          items:
            type: object
            properties:
              resident_id:
                type: string
              reason:
                type: string
    SeedRequest:
      type: object
      properties:
        seed:
          type: string
      required: [seed]
    SeedResponse:
      type: object
      properties:
        seed:
          type: string
        streams:
          type: object
          additionalProperties:
            type: string
    RunDayRequest:
      type: object
      properties:
        seed:
          type: string
        map_snapshot_id:
          type: string
        simulation_limits:
          type: object
          properties:
            max_duration_ms:
              type: integer
            max_ticks:
              type: integer
        export_metrics:
          type: boolean
      required: [seed, map_snapshot_id]
    RunDayResponse:
      type: object
      properties:
        tick_count:
          type: integer
        per_tick_hashes:
          type: array
          items:
            type: string
        congestion_summary:
          type: array
          items:
            type: object
            properties:
              segment_id:
                type: string
              average_speed_mps:
                type: number
              queue_length:
                type: integer
    SaveRequest:
      type: object
      properties:
        snapshot_id:
          type: string
        state:
          type: object
          description: Serialized DTOs for roads/buildings/agents/vehicles
      required: [snapshot_id, state]
    SaveResponse:
      type: object
      properties:
        snapshot_id:
          type: string
        persisted_at:
          type: string
          format: date-time
